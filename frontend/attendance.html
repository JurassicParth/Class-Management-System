<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance | CMS</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard-container">

    <aside class="sidebar">

        <h2>CMS</h2>

        <ul>
            <li><a href="dashboard.html"><i class="fas fa-house"></i> Dashboard</a></li>
            <li><a href="students.html"><i class="fas fa-user-graduate"></i> Students</a></li>
            <li><a href="teachers.html"><i class="fas fa-chalkboard-teacher"></i> Teachers</a></li>
            <li><a href="attendance.html"><i class="fas fa-calendar-check"></i> Attendance</a></li>
            <li><a href="marks.html"><i class="fas fa-file-lines"></i> Marks</a></li>
            <li><a href="courses.html"><i class="fas fa-book"></i> Courses</a></li>
            <li><a href="announcements.html"><i class="fas fa-bullhorn"></i> Announcements</a></li>
            <li><a href="login.html"><i class="fas fa-right-from-bracket"></i> Logout</a></li>
        </ul>

    </aside>

    <main class="main-content">

        <div class="page-header">
            <h1>Attendance Management</h1>

            <button class="add-btn">
                Mark Attendance
            </button>
        </div>

        <input
            type="text"
            id="searchAttendance"
            placeholder="Search Attendance..."
            class="search-box"
        >

        <table class="student-table">

            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="attendanceTable"></tbody>

        </table>

    </main>

</div>

<div id="attendanceModal" class="modal">

    <div class="modal-content">

        <h2 id="attendanceModalTitle">
            Mark Attendance
        </h2>

        <input
            type="text"
            id="attendanceStudent"
            placeholder="Student Name"
        >

        <input
            type="date"
            id="attendanceDate"
        >

        <select id="attendanceStatus">

            <option value="">
                Select Status
            </option>

            <option value="Present">
                Present
            </option>

            <option value="Absent">
                Absent
            </option>

        </select>

        <div class="modal-buttons">

            <button id="saveAttendance">
                Save
            </button>

            <button id="closeAttendanceModal">
                Cancel
            </button>

        </div>

    </div>

</div>

<script src="js/attendance.js"></script>

</body>
</html>
