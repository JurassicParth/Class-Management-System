<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile | CMS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card" style="text-align: left;">
            <h2>Manage Profile Workspace</h2>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #cbd5e1;">
            
            <form id="profileForm">
                <div class="form-group">
                    <label>Display Name</label>
                    <input type="text" id="profileName" value="Parth" required>
                </div>
                <div class="form-group">
                    <label>Contact Email</label>
                    <input type="email" id="profileEmail" value="parth@cms.edu" required>
                </div>
                <button type="submit" class="login-btn" style="background-color: #2563eb;">Update Profile Details</button>
            </form>
        </div>
    </div>
</body>
</html>
