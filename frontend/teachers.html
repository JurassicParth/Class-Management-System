<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teachers | CMS</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <h2>CMS</h2>
        <ul>
          <li>
            <a href="profile.html"><i class="fas fa-id-card"></i> My Profile</a>
          </li>
          <li>
            <a href="dashboard.html"><i class="fas fa-house"></i> Dashboard</a>
          </li>
          <li>
            <a href="students.html"
              ><i class="fas fa-user-graduate"></i> Students</a
            >
          </li>
          <li>
            <a href="teachers.html"
              ><i class="fas fa-chalkboard-teacher"></i> Teachers</a
            >
          </li>
          <li>
            <a href="attendance.html"
              ><i class="fas fa-calendar-check"></i> Attendance</a
            >
          </li>
          <li>
            <a href="marks.html"><i class="fas fa-file-lines"></i> Marks</a>
          </li>
          <li>
            <a href="courses.html"><i class="fas fa-book"></i> Courses</a>
          </li>
          <li>
            <a href="announcements.html"
              ><i class="fas fa-bullhorn"></i> Announcements</a
            >
          </li>
          <li>
            <a href="login.html"
              ><i class="fas fa-right-from-bracket"></i> Logout</a
            >
          </li>
        </ul>
      </aside>

      <main class="main-content">
        <div class="page-header">
          <h1>Teacher Management</h1>
          <button class="add-btn">Add Teacher</button>
        </div>

        <input
          type="text"
          id="searchTeacher"
          placeholder="Search Teacher..."
          class="search-box"
        />

        <table class="student-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Subject</th>
              <th>Email</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="teacherTable"></tbody>
        </table>
      </main>
    </div>

    <div id="teacherModal" class="modal">
      <div class="modal-content">
        <h2 id="modalTitle">Add Teacher</h2>

        <input
          type="text"
          id="teacherId"
          placeholder="Teacher ID (e.g., T101)"
        />
        <input type="text" id="teacherName" placeholder="Full Name" />

        <label
          style="
            color: #334155;
            font-weight: 600;
            text-align: left;
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
          "
          >Assign Subject:</label
        >
        <select
          id="teacherAssignedSubject"
          style="
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            width: 100%;
          "
        >
          <option value="">-- Select Subject --</option>
          <option value="Mathematics">Mathematics</option>
          <option value="Science">Science</option>
          <option value="English">English</option>
          <option value="History">History</option>
          <option value="Geography">Geography</option>
          <option value="Civics">Civics</option>
          <option value="Music">Music</option>
          <option value="Physical Education">Physical Education</option>
          <option value="Art">Art</option>
          <option value="Physics">Physics</option>
          <option value="Chemistry">Chemistry</option>
          <option value="Biology">Biology</option>
          <option value="Computer Science">Computer Science</option>
          <option value="Economics">Economics</option>
          <option value="Business Studies">Business Studies</option>
          <option value="Psychology">Psychology</option>
          <option value="Sociology">Sociology</option>
          <option value="Philosophy">Philosophy</option>
          <option value="Political Science">Political Science</option>
          <option value="Environmental Science">Environmental Science</option>
          <option value="Foreign Languages">Foreign Languages</option>
          <option value="Drama">Drama</option>
          <option value="Dance">Dance</option>
          <option value="Health Education">Health Education</option>
          <option value="Home Economics">Home Economics</option>
          <option value="Media Studies">Media Studies</option>
          <option value="Religious Studies">Religious Studies</option>
          <option value="Statistics">Statistics</option>
          <option value="Astronomy">Astronomy</option>
          <option value="Engineering">Engineering</option>
          <option value="Law">Law</option>
          <option value="Architecture">Architecture</option>
          <option value="Anthropology">Anthropology</option>
          <option value="Linguistics">Linguistics</option>
          <option value="Cultural Studies">Cultural Studies</option>
          <option value="Journalism">Journalism</option>
          <option value="International Relations">
            International Relations
          </option>
          <option value="Library Science">Library Science</option>
          <option value="Tourism Studies">Tourism Studies</option>
          <option value="Sports Science">Sports Science</option>
          <option value="Fashion Design">Fashion Design</option>
          <option value="Interior Design">Interior Design</option>
          <option value="Graphic Design">Graphic Design</option>
          <option value="Animation">Animation</option>
          <option value="Game Design">Game Design</option>
          <option value="Robotics">Robotics</option>
          <option value="Artificial Intelligence">
            Artificial Intelligence
          </option>
          <option value="Data Science">Data Science</option>
          <option value="Cybersecurity">Cybersecurity</option>
          <option value="Blockchain Technology">Blockchain Technology</option>
          <option value="Cloud Computing">Cloud Computing</option>
          <option value="Virtual Reality">Virtual Reality</option>
          <option value="Augmented Reality">Augmented Reality</option>
          <option value="Internet of Things">Internet of Things</option>
          <option value="Quantum Computing">Quantum Computing</option>
          <option value="Nanotechnology">Nanotechnology</option>
          <option value="Renewable Energy">Renewable Energy</option>
          <option value="Sustainable Development">
            Sustainable Development
          </option>
          <option value="Marine Biology">Marine Biology</option>
          <option value="Astrophysics">Astrophysics</option>
          <option value="Genetics">Genetics</option>
          <option value="Neuroscience">Neuroscience</option>
          <option value="Biotechnology">Biotechnology</option>
          <option value="Pharmacology">Pharmacology</option>
          <option value="Agricultural Science">Agricultural Science</option>
          <option value="Forestry">Forestry</option>
          <option value="Geology">Geology</option>
          <option value="Meteorology">Meteorology</option>
          <option value="Oceanography">Oceanography</option>
          <option value="Paleontology">Paleontology</option>
          <option value="Archaeology">Archaeology</option>
          <option value="Ethics">Ethics</option>
          <option value="Critical Thinking">Critical Thinking</option>
          <option value="Problem Solving">Problem Solving</option>
          <option value="Leadership">Leadership</option>
          <option value="Entrepreneurship">Entrepreneurship</option>
        </select>

        <input type="email" id="teacherEmail" placeholder="Email Address" />

        <div class="modal-buttons">
          <button id="saveTeacher">Save</button>
          <button id="closeTeacherModal">Cancel</button>
        </div>
      </div>
    </div>

    <script src="js/teachers.js"></script>
  </body>
</html>
