<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Courses | CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <h2>CMS</h2>
            <ul>
                <li>
                    <a href="dashboard.html"><i class="fas fa-house"></i> Dashboard</a>
                </li>
                <li>
                    <a href="students.html"><i class="fas fa-user-graduate"></i> Students</a>
                </li>
                <li>
                    <a href="teachers.html"><i class="fas fa-chalkboard-teacher"></i> Teachers</a>
                </li>
                <li>
                    <a href="attendance.html"><i class="fas fa-calendar-check"></i> Attendance</a>
                </li>
                <li>
                    <a href="marks.html"><i class="fas fa-file-lines"></i> Marks</a>
                </li>
                <li>
                    <a href="courses.html"><i class="fas fa-book"></i> Courses</a>
                </li>
                <li>
                    <a href="announcements.html"><i class="fas fa-bullhorn"></i> Announcements</a>
                </li>
                <li>
                    <a href="login.html"><i class="fas fa-right-from-bracket"></i> Logout</a>
                </li>
            </ul>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <h1>Course Management</h1>
                <button class="add-btn">Add Course</button>
            </div>
            <input type="text" id="searchCourse" placeholder="Search Course..." class="search-box" />
            <table class="student-table">
                <thead>
                    <tr>
                        <th>Course ID</th>
                        <th>Course Name</th>
                        <th>Duration</th>
                        <th>Teacher</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="courseTable"></tbody>
            </table>
        </main>
    </div>
    <div id="courseModal" class="modal">
    <div class="modal-content">
        <h2 id="courseModalTitle">Add Subject Definition</h2>

        <label style="color: #334155; font-weight: 600; text-align: left; display: block; margin-bottom: 5px;">Assign to Class Standard:</label>
        <select id="courseClassStandard" style="padding: 10px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #cbd5e1;">
            <option value="1st Standard">1st Standard</option>
            <option value="2nd Standard">2nd Standard</option>
            <option value="3rd Standard">3rd Standard</option>
            <option value="4th Standard">4th Standard</option>
            <option value="5th Standard">5th Standard</option>
            <option value="6th Standard">6th Standard</option>
            <option value="7th Standard">7th Standard</option>
            <option value="8th Standard">8th Standard</option>
            <option value="9th Standard">9th Standard</option>
            <option value="10th Standard">10th Standard</option>
            <option value="11th Standard">11th Standard</option>
            <option value="12th Standard">12th Standard</option>
        </select>

        <input type="text" id="courseId" placeholder="Subject/Course ID" />
        <input type="text" id="courseName" placeholder="Subject Name" />
        <input type="text" id="courseDuration" placeholder="Weekly Hours / Duration" />
        <input type="text" id="courseTeacher" placeholder="Assigned Teacher Name" />
        
        <div class="modal-buttons">
            <button id="saveCourse">Save</button>
            <button id="closeCourseModal">Cancel</button>
        </div>
    </div>
</div>
    <script src="js/courses.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
