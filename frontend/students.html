<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Students | CMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>CMS</h2>

      <ul>
        <li>
          <a href="dashboard.html"><i class="fas fa-house"></i> Dashboard</a>
        </li>

        <li>
          <a href="students.html"><i class="fas fa-user-graduate"></i> Students</a>
        </li>

        <li>
          <a href="teachers.html"><i class="fas fa-chalkboard-teacher"></i> Teachers</a>
        </li>

        <li>
          <a href="attendance.html"><i class="fas fa-calendar-check"></i> Attendance</a>
        </li>

        <li>
          <a href="marks.html"><i class="fas fa-file-lines"></i> Marks</a>
        </li>

        <li>
          <a href="courses.html"><i class="fas fa-book"></i> Courses</a>
        </li>

        <li>
          <a href="announcements.html"><i class="fas fa-bullhorn"></i> Announcements</a>
        </li>

        <li>
          <a href="login.html"><i class="fas fa-right-from-bracket"></i> Logout</a>
        </li>
      </ul>
    </aside>

    <!-- Main Content -->

    <main class="main-content">
      <div class="page-header">
        <h1>Student Management</h1>

        <button class="add-btn">Add Student</button>
      </div>

      <input type="text" id="searchStudent" placeholder="Search Student..." class="search-box" />

      <table class="student-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Class</th>
            <th>Email</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="studentTable"></tbody>
      </table>
    </main>
  </div>

  <div id="studentModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Add Student</h2>

      <input type="text" id="studentId" placeholder="Student ID" />

      <input type="text" id="studentName" placeholder="Student Name" />

      <input type="text" id="studentClass" placeholder="Class" />

      <input type="email" id="studentEmail" placeholder="Email" />

      <div class="modal-buttons">
        <button id="saveStudent">Save</button>
        <button id="closeModal">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/students.js"></script>
</body>
</html>
