    <!-- ===========================
        MAIN CONTENT
=========================== -->

    <main class="main-content">
        <div class="action-bar">
            <div>
                <h1 class="page-title">Students</h1>

                <p>Manage all student records.</p>
            </div>

            <button class="add-btn" id="addStudentBtn">
                <i class="fa-solid fa-user-plus"></i>

                Add Student
            </button>
        </div>

        <!-- SEARCH -->

        <div class="search-box">
            <input type="text" id="searchStudent" placeholder="Search Student..." />
        </div>

        <!-- TABLE -->

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Student ID</th>

                        <th>Name</th>

                        <th>Class</th>

                        <th>Email</th>

                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="studentTable"></tbody>
            </table>
        </div>
    </main>
</body>

</html>
<!-- ===========================
ADD / EDIT STUDENT MODAL
=========================== -->

<div class="modal" id="studentModal">

    <div class="modal-content">

        <span class="close" id="closeStudentModal">

            &times;

        </span>

        <h2 id="studentModalTitle">

            Add Student

        </h2>

        <form id="studentForm">

            <div class="form-group">

                <label>

                    Student ID

                </label>

                <input type="text" id="studentId" required>

            </div>

            <div class="form-group">

                <label>

                    Student Name

                </label>

                <input type="text" id="studentName" required>

            </div>

            <div class="form-group">

                <label>

                    Class

                </label>

                <input type="text" id="studentClass" required>

            </div>

            <div class="form-group">

                <label>

                    Email

                </label>

                <input type="email" id="studentEmail" required>

            </div>

            <button type="submit" class="btn btn-primary form-btn" id="saveStudent">

                Save Student

            </button>

        </form>

    </div>

</div>

<!-- ===========================
TOAST MESSAGE
=========================== -->

<div class="toast" id="toast">

</div>
